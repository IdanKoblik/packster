name: Test

on:
  workflow_call:

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start services
        run: docker compose up -d

      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres..."
          timeout 60s bash -c 'until docker compose exec -T postgres pg_isready -U root -d packster; do sleep 2; done'

      - name: Create UI stub for tests
        run: echo '<!DOCTYPE html><html><body>stub</body></html>' > internal/ui/static/index.html

      - name: Run tests with coverage
        run: make cover-integration

      - name: Tear down services
        if: always()
        run: docker compose down

