name: Test

on:
  workflow_call:

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start services
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for MongoDB..."
          until docker exec mongo mongosh --quiet --eval 'db.runCommand("ping").ok'; do sleep 1; done
          echo "Waiting for Redis..."
          until docker exec redis redis-cli ping; do sleep 1; done

      - name: Create UI stub for tests
        run: echo '<!DOCTYPE html><html><body>stub</body></html>' > internal/ui/static/index.html

      - name: Run tests with coverage
        run: make cover-integration

      - name: Tear down services
        if: always()
        run: docker compose down

