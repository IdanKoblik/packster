name: Release

on:
  workflow_call:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  check-coverage:
    name: Coverage Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build UI
        run: make ui-build

      - name: Start services
        run: docker compose up -d

      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres..."
          timeout 60s bash -c 'until docker compose exec -T postgres pg_isready -U root -d packster; do sleep 2; done'

      - name: Run coverage (unit + integration)
        run: make cover-integration

      - name: Tear down services
        if: always()
        run: docker compose down

      - name: Parse coverage percentage
        id: cov
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          PASS=$(awk "BEGIN { print ($TOTAL > 80) ? \"true\" : \"false\" }")
          echo "pass=$PASS" >> $GITHUB_OUTPUT
          echo "Coverage: $TOTAL%"

      - name: Fail if coverage below 80%
        if: steps.cov.outputs.pass != 'true'
        run: |
          echo "::error::Coverage ${{ steps.cov.outputs.total }}% is below the 80% threshold. Skipping release."
          exit 1

      - name: Build binary
        run: make build

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: packster-linux-amd64
          path: bin/packster

  ghcr:
    name: Push to GHCR
    needs: check-coverage
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: packster-linux-amd64
          path: bin/

      - name: Prepare binary for Docker build context
        run: cp bin/packster packster && chmod +x packster

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  github-release:
    name: GitHub Release
    needs: check-coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: packster-linux-amd64
          path: bin/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          files: bin/packster
          generate_release_notes: true
